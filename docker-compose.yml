version: '3.8'

services:
  # Cérebro (Orquestrador, Publicador e HealthCheck)
  cerebro:
    build: .
    command: python main.py
    volumes:
      - ./data:/app/data
      - ./downloads:/app/downloads
      - ./logs:/app/logs
    env_file: .env
    restart: always

  # Servidor de Webhooks (FastAPI)
  webhook:
    build: .
    command: uvicorn app.webhook_server:app --host 0.0.0.0 --port 6000
    ports:
      - "6000:6000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    env_file: .env
    restart: always

  # Dashboard de Triagem (Streamlit)
  dashboard:
    build: .
    command: streamlit run app/dashboard/dashboard.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./downloads:/app/downloads
    env_file: .env
    restart: always

# Volumes para persistência local
volumes:
  data:
  logs:
  downloads:
